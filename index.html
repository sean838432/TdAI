<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TdAI Automated Log Viewer</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, sans-serif;
            padding: 2rem;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 { color: #ffffff; border-b: 1px solid #334155; padding-bottom: 0.5rem; }
        .latest-box {
            background-color: #1e293b;
            border: 1px solid #475569;
            padding: 1.5rem;
            border-radius: 0.75rem;
            margin: 1.5rem 0;
            font-size: 1.25rem;
            font-weight: bold;
        }
        .highlight { color: #38bdf8; }
        pre {
            background-color: #020617;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.875rem;
            color: #94a3b8;
            max-height: 200px;
        }
    </style>
</head>
<body>

    <h1>TdAI Cron Sync Test</h1>
    <p>This webpage reads directly from the <code>test_history.txt</code> file generated by GitHub Actions.</p>

    <div class="latest-box">
        Latest Entry: <span id="latest-value" class="highlight">Loading data...</span>
    </div>

    <h3>Full Raw Log History:</h3>
    <pre id="raw-log">Loading raw log history...</pre>

    <script>
        // 🚀 Fetch the text file sitting right next to this HTML file in the repository
        fetch('./test_history.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Could not find the test_history.txt file yet.");
                }
                return response.text();
            })
            .then(text => {
                // Display the full raw contents inside the <pre> box
                document.getElementById('raw-log').textContent = text.trim();

                // Clean the text data into individual lines
                const lines = text.trim().split('\n');
                
                // Grab the very last line item (the most recent entry)
                const lastLine = lines[lines.length - 1];

                // Update the dashboard readout
                document.getElementById('latest-value').textContent = lastLine;
            })
            .catch(error => {
                document.getElementById('latest-value').textContent = "Error loading data";
                document.getElementById('raw-log').textContent = error.message;
            });
    </script>
</body>
</html>
