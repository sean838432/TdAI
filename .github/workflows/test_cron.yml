name: Test Python Cron Trigger

on:
  schedule:
    # 🚀 Run automatically every day at 14:45 UTC
    - cron: '36 20 * * *'
  workflow_dispatch:
    # 🎯 Adds a manual play button in your browser for on-demand testing

jobs:
  execute-test-job:
    runs-on: ubuntu-latest
    
    # Give the virtual runner explicit permission to write changes back to your repository
    permissions:
      contents: write
      
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set Up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Run Sample Generator Script
      run: python sample_generator.py

    - name: Commit and Push Updated Log File Back to Repository
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated Log Update: New Random Entry Added"
        file_pattern: "test_history.txt"
