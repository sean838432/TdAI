name: TdAI Production Core Automation

on:
  schedule:
    - cron: '45 14 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # originally 3.12

      - name: Install System GRIB Unpacking Drivers
        # Fixes Exit Code 100 by adding a defensive retry mechanism for apt-get
        run: |
          sudo apt-get update
          for i in {1..5}; do
            sudo apt-get install -y libeccodes-dev eccodes && break || sleep 15;
          done

      - name: Install Python Science Libraries
        # Forces pip to read your specific version rules from requirements.txt
        run: |
          pip install -r requirements.txt
          
      - name: Execute TdAI Model Ingestion & Verification
        run: python TdAI_operational.py

      - name: Commit and Push Updated CSV Ledger Back to Repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Data Update: TdAI Core Matrix Appended"
          file_pattern: "operational_log.csv"
