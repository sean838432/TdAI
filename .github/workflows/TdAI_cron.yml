name: TdAI Production Core Automation

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # originally 3.12

      - name: Install System GRIB Unpacking Drivers
        # Fixes Exit Code 100 by adding a defensive retry mechanism for apt-get
        run: |
          sudo apt-get update
          for i in {1..5}; do
            sudo apt-get install -y libeccodes-dev eccodes && break || sleep 15;
          done

      - name: Install Python Science Libraries
        # Forces pip to read your specific version rules from requirements.txt
        run: |
          pip install -r requirements.txt
          
      - name: Execute TdAI Deterministic Model Run
        run: python TdAI_deterministic_operational.py

      - name: Execute TdAI Probabilistic Model Run
        run: python TdAI_probabilistic_operational.py

      - name: Commit and Push Updated Ledgers
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add operational_log.csv operational_probabilistic_log.csv
          git commit -m "Sync daily deterministic and probabilistic operational logs [Skip CI]" || echo "No changes to commit"
          git push origin feature/probabilistic-upgrade
